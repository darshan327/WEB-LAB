<!DOCTYPE html>
<html>

<head>
    <title>Registration Page</title>

    <style>
        body {
            background-color: purple;
            color: white;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        form {
            text-align: center;
        }

        label {
            display: inline-block;
            width: 120px;
            text-align: right;
        }

        input {
            padding: 5px;
        }

        button {
            padding: 8px 15px;
            font-weight: bold;
        }
    </style>

    <script>
        function validateForm() {

            var userId =
                document.getElementById("userId").value;

            var name =
                document.getElementById("name").value;

            var password =
                document.getElementById("password").value;

            var email =
                document.getElementById("email").value;

            // User ID Validation
            if (userId.length < 5 || userId.length > 12) {

                alert("User ID must be between 5 and 12 characters long");

                return;
            }

            // Name Validation
            if (name.length < 10 ||
                !/^[a-zA-Z ]+$/.test(name)) {

                alert("Name must be at least 10 characters long and contain only alphabets");

                return;
            }

            // Password Validation
            var passwordRegex =
                /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()])[A-Za-z\d!@#$%^&*()]{8,}$/;

            if (!passwordRegex.test(password)) {

                alert("Password must contain at least 8 characters, one uppercase letter, one digit and one special character");

                return;
            }

            // Email Validation
            var emailRegex =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {

                alert("Invalid Email Address");

                return;
            }

            let details =
                "User ID: " + userId +
                "\nName: " + name +
                "\nPassword: " + password +
                "\nEmail: " + email;

            alert(details);
        }
    </script>

</head>

<body>

    <div>

        <h1>Registration Page</h1>

        <form>

            <label for="userId">User ID:</label>

            <input
                type="text"
                id="userId"
                name="userId" />
            <br /><br />

            <label for="name">Name:</label>

            <input
                type="text"
                id="name"
                name="name" />
            <br /><br />

            <label for="password">Password:</label>

            <input
                type="password"
                id="password"
                name="password" />
            <br /><br />

            <label for="email">Email:</label>

            <input
                type="email"
                id="email"
                name="email" />
            <br /><br />

            <button
                type="button"
                onclick="validateForm()">
                Submit
            </button>

        </form>

    </div>

</body>
</html>

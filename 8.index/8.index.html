<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Compute Average Marks</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <h1>XHTML FORM TO COMPUTE AVERAGE MARKS</h1>

    <form class="container">

        <label>Register Number:</label>
        <input type="text" name="regno" />

        <label>Subject Code:</label>
        <input type="text" name="subjectcode" />

        <label>Marks in Test 1:</label>
        <input type="number" id="marks1" />

        <label>Marks in Test 2:</label>
        <input type="number" id="marks2" />

        <label>Marks in Test 3:</label>
        <input type="number" id="marks3" />

        <button
            type="button"
            onclick="calculateAverage()"
            class="my-button-class">
            Calculate Average
        </button>

    </form>

    <script src="script.js"></script>

</body>
</html>
